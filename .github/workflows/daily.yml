name: Send Daily Email

on:
  schedule:
    - cron: '20 9 * * *'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run script
        env:
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python send_email.py
